name: Improvement
description: Suggest an improvement to existing functionality
title: "[Improvement]: "
labels: ["improvement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement!

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this improvement relate to?
      options:
        - UI/UX
        - Performance
        - Code Quality
        - Developer Experience
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: Describe the current behavior or state.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Improvement
      description: Describe what you'd like to see improved and how.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or screenshots.
